<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CJNG — Community & Faceit</title>

    <link rel="icon" type="image/gif" href="https://images.steamusercontent.com/ugc/12144873916895394154/1D8C434C22994531391D4C088CB7432100839AC9/?imw=512&imh=376&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=true">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --card-bg: rgba(26, 22, 46, 0.75);
            --accent: #9d50bb;
            --accent-2: #6e48aa;
            --text-main: #ffffff;
            --text-dim: #8e9297;
            --online-color: #43b581;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 20%, rgba(157, 80, 187, 0.2), transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(110, 72, 170, 0.2), transparent 40%);
            animation: glowAnimation 12s infinite alternate ease-in-out;
        }

        @keyframes glowAnimation {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 90%;
            max-width: 420px;
            padding: 45px 35px;
            border-radius: 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
            animation: containerIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 8px;
        }

        .server-icon {
            width: 65px;
            height: 65px;
            border-radius: 18px;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(157, 80, 187, 0.4);
            object-fit: cover;
            transition: 0.4s;
            background: #000;
        }

        .logo {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(to bottom, #ffffff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            filter: drop-shadow(0 0 10px rgba(157, 80, 187, 0.2));
        }

        .sub-text {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 35px;
            font-weight: 400;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.04);
            padding: 20px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.3s;
        }

        .stat-box:hover {
            background: rgba(157, 80, 187, 0.1);
            border-color: rgba(157, 80, 187, 0.3);
            transform: translateY(-4px);
        }

        .stat-value { font-size: 1.8rem; font-weight: 700; display: block; }
        .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

        .btn-main {
            display: block;
            background: linear-gradient(45deg, var(--accent), var(--accent-2));
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(157, 80, 187, 0.3);
        }

        .btn-main:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(157, 80, 187, 0.5); }

        .bots-toggle {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0.7;
            transition: 0.3s;
            text-decoration: none;
            font-weight: 500;
        }

        .bots-toggle:hover { opacity: 1; }

        .arrow {
            width: 8px; height: 8px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg);
            transition: 0.4s;
        }

        .bots-toggle.active .arrow { transform: rotate(135deg); }

        .bots-list {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 20px;
        }

        .bot-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 18px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 12px;
            text-align: left;
        }

        .bot-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .bot-name { 
            font-size: 0.9rem; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
            cursor: help; 
            transition: 0.3s;
        }
        .bot-name:hover { color: var(--accent); }
        
        .status { font-size: 0.75rem; display: flex; align-items: center; gap: 6px; color: var(--online-color); font-weight: 600; }
        .dot { width: 7px; height: 7px; background: var(--online-color); border-radius: 50%; box-shadow: 0 0 8px var(--online-color); }

        .btn-add-small {
            display: inline-block;
            text-align: center;
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 0.75rem;
            padding: 6px 14px;
            border-radius: 8px;
            transition: 0.3s;
            font-weight: 600;
        }

        .btn-add-small:hover { background: #ffffff; color: #1a162e; border-color: #ffffff; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: 0.3s;
        }

        .modal-content {
            background: #1a162e;
            border: 1px solid var(--accent);
            padding: 30px;
            border-radius: 24px;
            max-width: 350px;
            width: 85%;
            position: relative;
            transform: scale(0.8);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: left;
        }

        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-overlay.active .modal-content { transform: scale(1); }

        .modal-title { font-size: 1.4rem; font-weight: 900; margin-bottom: 15px; color: var(--accent); }
        .modal-desc { font-size: 0.95rem; line-height: 1.5; color: #ccc; margin-bottom: 20px; }
        
        .modal-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none; color: #fff;
            font-size: 1.5rem; cursor: pointer; opacity: 0.5;
        }
        .modal-close:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="header-main">
            <img src="seed3721501937.gif" 
                 alt="Logo" class="server-icon"
                 onerror="this.src='https://ui-avatars.com/api/?name=CJNG&background=9d50bb&color=fff'">
            <h1 class="logo">CJNG</h1>
        </div>
        
        <div class="sub-text">Community & Faceit</div>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-value" id="totalCount">441</span>
                <span class="stat-label">Участников</span>
            </div>
            <div class="stat-box">
                <span class="stat-value" id="onlineCount" style="color: var(--online-color);">...</span>
                <span class="stat-label">В сети</span>
            </div>
        </div>

        <a href="https://discord.gg/mQtgtbtQY6" class="btn-main">Присоединиться</a>

        <a href="javascript:void(0)" class="bots-toggle" id="toggleBots">
            Наши боты <span class="arrow"></span>
        </a>

        <div class="bots-list" id="botsList">
            <div class="bot-item">
                <div class="bot-info">
                    <span class="bot-name" onclick="showInfo('faceit')">DL FACEIT БОТ</span>
                    <span class="status"><span class="dot"></span> Online</span>
                </div>
                <a href="https://discord.com/oauth2/authorize?client_id=1462154423039037531&permissions=19456&integration_type=0&scope=bot" target="_blank" class="btn-add-small">
                    Добавить на сервер
                </a>
            </div>

            <div class="bot-item">
                <div class="bot-info">
                    <span class="bot-name" onclick="showInfo('live')">DL LIVE БОТ</span>
                    <span class="status"><span class="dot"></span> Online</span>
                </div>
                <a href="https://discord.com/oauth2/authorize?client_id=1457555622567481436&permissions=346112&integration_type=0&scope=bot" target="_blank" class="btn-add-small">
                    Добавить на сервер
                </a>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modalTitle">Название бота</div>
            <div class="modal-desc" id="modalDesc">Описание функций бота...</div>
            <button class="btn-add-small" style="width: 100%; padding: 12px; color: #000; background: #fff; border:none;" onclick="closeModal()">Понятно</button>
        </div>
    </div>

    <script>
        const botData = {
            'faceit': {
                title: 'DL FACEIT БОТ',
                desc: 'Этот бот предназначен для отслеживания статистики Faceit. Он показывает уровень (ELO), историю последних матчей, винрейт и уведомляет о начале игр.'
            },
            'live': {
                title: 'DL LIVE БОТ',
                desc: 'Бот для стримеров и контент-мейкеров. Автоматически уведомляет участников сервера о начале трансляций на Tik tok и помогает управлять уведомлениями.'
            }
        };

        function showInfo(botKey) {
            const data = botData[botKey];
            document.getElementById('modalTitle').innerText = data.title;
            document.getElementById('modalDesc').innerText = data.desc;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        const toggleBtn = document.getElementById('toggleBots');
        const list = document.getElementById('botsList');

        toggleBtn.addEventListener('click', () => {
            toggleBtn.classList.toggle('active');
            if (list.style.maxHeight) {
                list.style.maxHeight = null;
            } else {
                list.style.maxHeight = list.scrollHeight + "px";
            }
        });

        // АДРЕС ТВОЕГО API ИЗ СКРИНШОТА
        const API_URL = 'https://discord.com/api/guilds/1275486349906018397/widget.json';

        async function updateStats() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Ставим живой онлайн (130+)
                document.getElementById('onlineCount').innerText = data.presence_count;
                
                // Проверяем количество участников
                if (data.members && data.members.length > 400) {
                   document.getElementById('totalCount').innerText = data.members.length;
                } else {
                   // Если API не отдает всех, оставляем твое точное число
                   document.getElementById('totalCount').innerText = "441";
                }
            } catch (error) {
                console.log("Ошибка API");
                document.getElementById('totalCount').innerText = "441";
                document.getElementById('onlineCount').innerText = "130";
            }
        }
        
        updateStats();
        setInterval(updateStats, 30000);
    </script>
</body>
</html>
